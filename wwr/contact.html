<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Down the River Rafting Company</title>
    <meta name="description"
      content="Get in touch with Down the River Rafting Company to book your rafting adventure, ask questions about trips, or request more information.">
    <meta name="author" content="Alan Feliz">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="Down the River Rafting Company Logo" width=125>
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="address">
            <div class="address-content">
                <h2>"Down the River" Rafting Company</h2>
                <p>50 E North Temple Street</p>
                <p>Salt Lake City, UT</p>
                <p>(801) 240 2640</p>
                <p>info@Raftingwater.com</p>
            </div>
        </section>

        <section class="contact">

            <!-- LEFT: Google Map -->
            <div class="contact-map">
                <iframe src="https://www.google.com/maps/embed?pb=YOUR_GOOGLE_MAP_EMBED_LINK"
                  width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
                </iframe>
            </div>

            <!-- RIGHT: Contact Form -->
            <div class="contact-form">
                <h2>Contact Us</h2>

                <form>
                    <label for="name">Name</label>
                    <input type="text" id="name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" required>

                    <p><strong>Message Purpose:</strong></p>

                    <label>
                        <input type="radio" name="purpose" value="general" checked>
                        General Inquiry
                    </label>

                    <label>
                        <input type="radio" name="purpose" value="reservation">
                        Reservation Question
                    </label>

                    <label>
                        <input type="radio" name="purpose" value="suggestion">
                        Website Suggestion
                    </label>

                    <label for="message"><strong>Message</strong></label>
                    <textarea id="message" rows="5" required></textarea>

                    <label class="checkbox-label">
                        <input type="checkbox" id="newsletter" name="newsletter">Please,
                        subscribe me to the monthly newsletter
                    </label>

                    <button type="submit" class="btn">Get In Touch</button>
                </form>
            </div>

        </section>


        <section class="employee">
            <h2>We Are Here to Serve You!</h2>

            <div class="employee-gallery">
                <figure>
                    <img src="images/employee1.jpeg" alt=" Eduard Smith 1 - River Guide">
                    <figcaption> Eduard Smith, Operations Manager</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpeg" alt=" Alan Walker 2 - Manager">
                    <figcaption>Alan Walker - Whitewater Guide </figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt=" Natasha Jackson 3 - Instructor">
                    <figcaption>Natasha Jackson- Safety Instructor</figcaption>
                </figure>
        </section>
    </main>

    <footer>
        <p>© 2026 | Whitewater Rafting | Alan Feliz | Santo Domingo Dominican Republic</p>


        <nav class="socialmedia">
            <a href="https://www.facebook.com">
                <img src="images/facebook-icon.png" width="50" height="50" alt="Facebook Icon">
            </a>
            <a href="https://www.twitter.com">
                <img src="images/twitter-icon.png" width="50" height="50" alt="Tuitter Icon">
            </a>
            <a href="https://www.instagram.com">
                <img src="images/instagram-icon.png" width="50" height="50" alt="Instagram Icon">
            </a>
        </nav>

    </footer>


</body>

</html>
