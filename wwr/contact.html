<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Contact us for reservations, questions, or feedback">
    <meta name="author" content="Maria D. Khosla">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>


<body>


    <!--HEADER-->

    <header class="site-header">
        <div class="logo">
            <img src="images/logo.png" alt="Rafting Company Logo" class="logo">
        </div>
        <nav class="site-nav">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>

        </nav>
    </header>


    <!--CONTACT SECTION-->
    <main class="contact-main">
        <!--TITLE / CONTACT INFO-->
        <section class="company-info">
            <h1>White Water Rafting Company</h1>
            <p>50 E North Temple Street</p>
            <p>Salt Lake City, UT</p>
            <p>(801) 240 2640</p>
            <p>info@Raftingwater.com</p>

        </section>
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d3747.352290329854!2d-100.82827091231619!3d20.07755511795465!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1775197110031!5m2!1sen!2sus"
          allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
        </iframe>


        <!--FORM-->

        <form class="contact-form"><label for="username">Name:</label>
            <input type="text" id="username" name="username">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email">

            <label>Message Purpose:</label>
            <div class="radio-group">
                <label><input type="radio" name="purpose" id="general"> General Inquiry</label>
                <label><input type="radio" name="purpose" id="reservation"> Reservation
                    Question</label>
                <label><input type="radio" name="purpose" id="suggestion"> Website
                    Suggestion</label>
            </div>
            <label for="message">Your Message:</label>
            <textarea id="message" name="message" rows="4"></textarea>

            <label>
                <input type="checkbox" id="newsletter" name="newsletter">
                Send me updates
            </label>

            <button type="submit">Get in Touch</button>
        </form>

        <!--Employee Profiles-->
        <section class="employees">
            <h2>Meet Our Team</h2>

            <figure>
                <img src="images/employee1.jpeg" alt=" Eduard Smith 1 - River Guide">
                <figcaption> Eduard Smith, Operations Manager</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpeg" alt=" Alan Walker 2 - Manager">
                <figcaption>Alan Walker - Whitewater Guide </figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt=" Natasha Jackson 3 - Instructor">
                <figcaption>Natasha Jackson- Safety Instructor</figcaption>
            </figure>
        </section>
    </main>

    <footer>
        <p>© 2026 | Whitewater Rafting | Alan Feliz | Santo Domingo Dominican Republic</p>


        <nav class="socialmedia">
            <a href="https://www.facebook.com">
                <img src="images/facebook-icon.png" width="50" height="50" alt="Facebook Icon">
            </a>
            <a href="https://www.twitter.com">
                <img src="images/twitter-icon.png" width="50" height="50" alt="Tuitter Icon">
            </a>
            <a href="https://www.instagram.com">
                <img src="images/instagram-icon.png" width="50" height="50" alt="Instagram Icon">
            </a>
        </nav>

    </footer>


</body>

</html>
